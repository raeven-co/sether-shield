<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
  .canvas { width: 1400px; height: 560px; padding: 0 80px; display: flex; align-items: center; gap: 64px; }
  .left { flex: 1.2; }
  .logo { width: 56px; height: 56px; border-radius: 14px; }
  h1 { font-size: 62px; font-weight: 800; letter-spacing: -0.035em; color: var(--ink); line-height: 1.02; margin-top: 22px; }
  p { font-size: 22px; color: var(--ink-2); font-weight: 500; margin-top: 18px; max-width: 640px; }
  .right { flex: 1; display: flex; justify-content: center; }
  .panel { width: 320px; }
  .pill { margin: 18px auto 0; }
  .wrap { position: relative; }
</style></head>
<body><div class="canvas"><div class="grain"></div>
  <div class="left">
    <img class="logo" src="../icons/icon128.png">
    <h1>Stop pasting secrets<br>into <span class="accent">AI</span>.</h1>
    <p>Sether Shield flags the personal data in your prompt and scrubs it in one click — 100% in your browser.</p>
  </div>
  <div class="right"><div class="wrap">
    <div class="panel">
      <div class="hd" style="font-weight:800;font-size:16px;margin-bottom:12px">3 items to scrub</div>
      <ul style="list-style:none">
        <li style="display:flex;align-items:center;gap:10px;font-size:15px;padding:7px 0;border-bottom:1px solid #f4f4f5"><span style="width:8px;height:8px;border-radius:999px;background:var(--orange)"></span>email<span style="margin-left:auto;font:700 12px/1 ui-monospace,monospace;color:var(--ink-3)">×1</span></li>
        <li style="display:flex;align-items:center;gap:10px;font-size:15px;padding:7px 0;border-bottom:1px solid #f4f4f5"><span style="width:8px;height:8px;border-radius:999px;background:var(--orange)"></span>phone<span style="margin-left:auto;font:700 12px/1 ui-monospace,monospace;color:var(--ink-3)">×1</span></li>
        <li style="display:flex;align-items:center;gap:10px;font-size:15px;padding:7px 0;border-bottom:1px solid #f4f4f5"><span style="width:8px;height:8px;border-radius:999px;background:var(--orange)"></span>name<span style="margin-left:auto;font:700 12px/1 ui-monospace,monospace;color:var(--ink-3)">×1</span></li>
      </ul>
      <button class="scrub">Scrub this prompt</button>
      <div class="ft"><span class="lock"></span>100% local, nothing leaves your browser.</div>
    </div>
    <div class="pill"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span class="n">3</span></div>
  </div></div>
</div></body></html>
